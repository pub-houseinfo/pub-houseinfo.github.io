<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ハウスインフォ リンク集</title>
  
  <!-- Tailwind CSSの読み込み（デザインを適用するために必要です） -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Lucide Iconsの読み込み（アイコンを表示するために必要です） -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="min-h-screen bg-[#f3f4f6] flex items-center justify-center p-4 sm:p-8 font-sans text-gray-800">

  <!-- スマホサイズのメインコンテナ -->
  <div class="w-full max-w-[400px] bg-white min-h-[800px] sm:min-h-[750px] rounded-[32px] shadow-2xl overflow-hidden relative">
    
    <!-- ヘッダーの背景デザイン -->
    <div class="h-44 bg-gradient-to-br from-slate-800 to-slate-900 w-full absolute top-0 left-0">
      <div class="absolute inset-0 opacity-20" style="background-image: radial-gradient(circle at 2px 2px, white 1px, transparent 0); background-size: 24px 24px;"></div>
    </div>

    <div class="relative z-10 pt-20 px-6 pb-20">
      
      <!-- プロフィールセクション -->
      <div class="flex flex-col items-center mb-6">
        <!-- アイコン画像 -->
        <div class="w-28 h-28 bg-white p-1.5 rounded-full shadow-lg mb-4">
          <div class="w-full h-full rounded-full overflow-hidden bg-gray-200 flex items-center justify-center">
            <img 
              src="images/logo.jpg" 
              alt="House Info" 
              class="w-full h-full object-cover"
            >
          </div>
        </div>
        
        <!-- アカウント名と説明 -->
        <h1 class="text-2xl font-black text-gray-900 mb-2 tracking-tight font-sans">ハウスインフォ</h1>
        <p class="text-[13px] text-gray-600 mb-2 text-center leading-relaxed font-medium">
          建築×宿泊×保育×AIでしあわせをデザインします。
        </p>
      </div>

      <!-- リンクボタンのリスト -->
      <div class="space-y-3.5">
        
        <!-- リンク1: ハウスインフォ公式サイト -->
        <a href="https://houseinfo.jp/" target="_blank" rel="noopener noreferrer" class="group block bg-white border border-gray-100 p-4 rounded-2xl shadow-[0_2px_12px_-4px_rgba(0,0,0,0.05)] hover:shadow-[0_8px_20px_-6px_rgba(0,0,0,0.1)] hover:border-gray-200 transition-all duration-300 transform hover:-translate-y-0.5">
          <div class="flex items-center justify-between">
            <div class="flex items-center gap-4">
              <div class="w-12 h-12 flex items-center justify-center rounded-xl bg-blue-50 text-blue-600 transition-transform duration-300 group-hover:scale-110">
                <i data-lucide="home" class="w-5 h-5"></i>
              </div>
              <div>
                <h2 class="font-bold text-gray-800 text-[15px] group-hover:text-slate-900 transition-colors tracking-tight">ハウスインフォ公式サイト</h2>
                <p class="text-[11px] text-gray-500 mt-0.5 font-medium">「しあわせ」をデザインする</p>
              </div>
            </div>
            <i data-lucide="chevron-right" class="w-5 h-5 text-gray-300 group-hover:text-slate-800 group-hover:translate-x-1 transition-all duration-300"></i>
          </div>
        </a>

        <!-- リンク2: 姫路駅周辺×宿泊事業 -->
        <a href="https://pub.houseinfo.jp/himejilp/" target="_blank" rel="noopener noreferrer" class="group block bg-white border border-gray-100 p-4 rounded-2xl shadow-[0_2px_12px_-4px_rgba(0,0,0,0.05)] hover:shadow-[0_8px_20px_-6px_rgba(0,0,0,0.1)] hover:border-gray-200 transition-all duration-300 transform hover:-translate-y-0.5">
          <div class="flex items-center justify-between">
            <div class="flex items-center gap-4">
              <div class="w-12 h-12 flex items-center justify-center rounded-xl bg-orange-50 text-orange-600 transition-transform duration-300 group-hover:scale-110">
                <i data-lucide="map-pin" class="w-5 h-5"></i>
              </div>
              <div>
                <h2 class="font-bold text-gray-800 text-[15px] group-hover:text-slate-900 transition-colors tracking-tight">姫路駅周辺×宿泊事業</h2>
                <p class="text-[11px] text-gray-500 mt-0.5 font-medium">姫路駅周辺を宿泊事業で活性化</p>
              </div>
            </div>
            <i data-lucide="chevron-right" class="w-5 h-5 text-gray-300 group-hover:text-slate-800 group-hover:translate-x-1 transition-all duration-300"></i>
          </div>
        </a>

        <!-- リンク3: リフォーム補助金2026 -->
        <a href="https://pub.houseinfo.jp/mado2026/" target="_blank" rel="noopener noreferrer" class="group block bg-white border border-gray-100 p-4 rounded-2xl shadow-[0_2px_12px_-4px_rgba(0,0,0,0.05)] hover:shadow-[0_8px_20px_-6px_rgba(0,0,0,0.1)] hover:border-gray-200 transition-all duration-300 transform hover:-translate-y-0.5">
          <div class="flex items-center justify-between">
            <div class="flex items-center gap-4">
              <div class="w-12 h-12 flex items-center justify-center rounded-xl bg-teal-50 text-teal-600 transition-transform duration-300 group-hover:scale-110">
                <i data-lucide="app-window" class="w-5 h-5"></i>
              </div>
              <div>
                <h2 class="font-bold text-gray-800 text-[15px] group-hover:text-slate-900 transition-colors tracking-tight">リフォーム補助金2026</h2>
                <p class="text-[11px] text-gray-500 mt-0.5 font-medium">補助金を活用したお得な断熱リフォーム</p>
              </div>
            </div>
            <i data-lucide="chevron-right" class="w-5 h-5 text-gray-300 group-hover:text-slate-800 group-hover:translate-x-1 transition-all duration-300"></i>
          </div>
        </a>

        <!-- リンク4: サブコンの未来を考える -->
        <a href="https://pub.houseinfo.jp/subcon/" target="_blank" rel="noopener noreferrer" class="group block bg-white border border-gray-100 p-4 rounded-2xl shadow-[0_2px_12px_-4px_rgba(0,0,0,0.05)] hover:shadow-[0_8px_20px_-6px_rgba(0,0,0,0.1)] hover:border-gray-200 transition-all duration-300 transform hover:-translate-y-0.5">
          <div class="flex items-center justify-between">
            <div class="flex items-center gap-4">
              <div class="w-12 h-12 flex items-center justify-center rounded-xl bg-slate-100 text-slate-600 transition-transform duration-300 group-hover:scale-110">
                <i data-lucide="building-2" class="w-5 h-5"></i>
              </div>
              <div>
                <h2 class="font-bold text-gray-800 text-[15px] group-hover:text-slate-900 transition-colors tracking-tight">サブコンの未来を考える</h2>
                <p class="text-[11px] text-gray-500 mt-0.5 font-medium">宿泊事業で第二の事業の柱をつくる</p>
              </div>
            </div>
            <i data-lucide="chevron-right" class="w-5 h-5 text-gray-300 group-hover:text-slate-800 group-hover:translate-x-1 transition-all duration-300"></i>
          </div>
        </a>

      </div>
    </div>

    <!-- フッター -->
    <div class="absolute bottom-0 left-0 w-full py-6 text-center bg-gradient-to-t from-white via-white to-transparent pointer-events-none">
      <p class="text-[11px] text-gray-400 font-medium tracking-wider">
        © HOUSEINFO. ALL RIGHTS RESERVED.
      </p>
    </div>
  </div>

  <!-- アイコンを描画するためのスクリプト -->
  <script>
    lucide.createIcons();
  </script>
</body>
</html>
